<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級活動調查系統</title>
    
    <!-- 引入 Klee One 作為芫荽體的雲端後備字體 (芫荽體基於 Klee One) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgLight: '#fefde8',      // 卡片底色 (溫暖的米黃色)
                        primary: '#8cb554',      // 主色調 (綠葉色)
                        primaryDark: '#6e933e',  // 主色調深色
                        textDark: '#4e341f',     // 文字色 (深咖啡色)
                        danger: '#d9534f',       // 刪除/警告色
                        info: '#4a90e2',         // 資訊/連結色
                        accent: '#d87f28',       // 長頸鹿橘棕色 (邊框與強調)
                    },
                    fontFamily: {
                        sans: ['"Iansui"', '"Klee One"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Quill (Rich Text Editor) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        /* 載入芫荽體 */
        @font-face {
            font-family: 'Iansui';
            src: local('Iansui'), url('https://cdn.jsdelivr.net/gh/max32002/iansui@master/Iansui-Regular.ttf') format('truetype');
            font-display: swap;
        }

        body {
            background-color: #e5f396; /* 呼應圖片天空的淺草綠色 */
            /* 底部大草原丘陵背景 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23c4e062" fill-opacity="1" d="M0,224L80,213.3C160,203,320,181,480,181.3C640,181,800,203,960,218.7C1120,235,1280,245,1360,250.7L1440,256L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z"></path></svg>');
            background-repeat: no-repeat;
            background-position: bottom;
            background-attachment: fixed;
            background-size: cover;
            color: #4e341f;
        }
        
        /* 活潑的圓角邊框設計 */
        .theme-border { 
            border: 3px solid #d87f28; 
            padding: 4px; 
            background-clip: content-box; 
            border-radius: 16px;
        }
        
        /* 卡片陰影改為活潑的橘棕色偏移 */
        .card-shadow { box-shadow: 4px 4px 0px 0px rgba(216, 127, 40, 0.25); }
        
        .hidden { display: none !important; }
        .modal-overlay { background-color: rgba(78, 52, 31, 0.6); backdrop-filter: blur(2px); }
        
        /* 自訂 Quill 編輯器樣式 */
        .ql-toolbar.ql-snow {
            border: 2px dashed #d87f28 !important;
            border-bottom: none !important;
            border-radius: 12px 12px 0 0;
            background-color: rgba(255, 255, 255, 0.5) !important;
            font-family: 'Iansui', 'Klee One', sans-serif;
        }
        .ql-container.ql-snow {
            border: 2px dashed #d87f28 !important;
            border-radius: 0 0 12px 12px;
            background-color: transparent !important;
            font-family: 'Iansui', 'Klee One', sans-serif;
            font-size: 16px;
            height: 250px;
        }
        
        /* 檢視模式的 Quill 樣式 */
        .ql-editor { white-space: pre-wrap; }
        .activity-desc table { border-collapse: collapse; width: 100%; }
        .activity-desc table th, .activity-desc table td { border: 1px solid #d87f28; padding: 8px; }
        
        /* 標題圖示 */
        .title-icon { font-size: 1.2em; line-height: 1; margin-right: 4px; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <!-- 全域載入提示 -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center bg-bgLight z-50">
        <div class="text-center">
            <div class="text-5xl mb-4 animate-bounce">🦒</div>
            <h2 class="text-xl font-bold text-textDark">系統連線中...</h2>
        </div>
    </div>

    <!-- 登入畫面 -->
    <div id="auth-screen" class="hidden flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl theme-border card-shadow max-w-md w-full relative mt-8">
            <div id="auth-site-title" class="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-bgLight px-5 py-2 border-2 border-accent text-accent font-bold rounded-full whitespace-nowrap shadow-sm">
                班級活動調查系統
            </div>
            <h2 class="text-3xl font-bold text-center mb-6 mt-4 text-textDark border-b-2 border-primary pb-2 flex justify-center items-center gap-2">
                <span class="text-4xl">🦒</span> 系統登入
            </h2>
            
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2 text-textDark">帳號 (學號/管理員帳號)</label>
                <input type="text" id="auth-username" class="w-full p-3 border-2 border-accent focus:outline-none focus:ring-4 focus:ring-primary/40 bg-bgLight rounded-xl transition-all" placeholder="請輸入帳號">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2 text-textDark">密碼</label>
                <input type="password" id="auth-password" class="w-full p-3 border-2 border-accent focus:outline-none focus:ring-4 focus:ring-primary/40 bg-bgLight rounded-xl transition-all" placeholder="請輸入密碼">
            </div>
            
            <p id="auth-error" class="text-danger text-sm mb-4 hidden text-center font-bold"></p>
            
            <button id="btn-submit-auth" class="w-full bg-primary hover:bg-primaryDark text-white font-bold py-3 px-4 rounded-xl transition-colors mb-4 border-b-4 border-primaryDark shadow-sm text-lg">
                登入
            </button>
            <button id="btn-back-to-app" class="w-full bg-bgLight hover:bg-accent hover:text-white text-textDark font-bold py-3 px-4 rounded-xl transition-colors mb-4 border-2 border-accent shadow-sm">
                返回活動列表 (訪客瀏覽)
            </button>
        </div>
    </div>

    <!-- 應用程式主畫面 -->
    <div id="app-screen" class="hidden flex-grow flex flex-col">
        <!-- 導覽列 -->
        <header class="bg-white border-b-4 border-primary shadow-sm sticky top-0 z-30">
            <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-3xl hidden sm:inline">🦒</span>
                    <h1 class="text-lg md:text-xl font-black tracking-widest text-textDark flex items-center gap-2">
                        <span id="nav-site-title">班級活動調查系統</span>
                        <!-- 管理者修改標題的按鈕 -->
                        <button id="btn-edit-site-title" class="hidden text-sm text-accent hover:text-primary transition-colors bg-bgLight px-2 py-1 rounded-lg border border-accent shadow-sm" title="修改系統標題">
                            ✏️ 編輯
                        </button>
                    </h1>
                </div>
                <div class="flex items-center gap-2 md:gap-4 shrink-0">
                    <div class="text-right hidden sm:block">
                        <div class="text-sm font-bold text-textDark" id="nav-username">使用者</div>
                        <div class="text-xs text-info" id="nav-role">角色</div>
                    </div>
                    <!-- 訪客登入 / 修改密碼與登出 -->
                    <button id="btn-nav-login" class="bg-primary hover:bg-primaryDark text-white px-4 md:px-5 py-2 rounded-xl text-xs md:text-sm transition-colors font-bold shadow-sm hidden border-b-2 border-primaryDark">
                        系統登入
                    </button>
                    <button id="btn-change-pwd-modal" class="bg-bgLight border-2 border-accent text-textDark hover:bg-accent hover:text-white px-3 md:px-4 py-1.5 rounded-xl text-xs md:text-sm transition-colors font-bold">
                        改密碼
                    </button>
                    <button id="btn-logout" class="bg-bgLight border-2 border-accent text-textDark hover:bg-accent hover:text-white px-3 md:px-4 py-1.5 rounded-xl text-xs md:text-sm transition-colors font-bold">
                        登出
                    </button>
                </div>
            </div>
        </header>

        <!-- 選單列 (針對管理者和協作者) -->
        <nav id="admin-nav" class="bg-bgLight border-b-2 border-accent hidden">
            <div class="max-w-6xl mx-auto px-4 flex gap-4 overflow-x-auto">
                <button id="tab-activities" class="py-3 px-4 border-b-4 border-primary text-primary font-bold whitespace-nowrap text-lg">調查列表</button>
                <button id="tab-users" class="py-3 px-4 border-b-4 border-transparent text-gray-500 hover:text-primary font-bold hidden whitespace-nowrap text-lg transition-colors">用戶管理 (管理員)</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-grow">
            <!-- 活動列表區塊 -->
            <section id="view-activities">
                <div class="flex justify-end mb-4 pb-2">
                    <button id="btn-create-activity" class="hidden bg-primary hover:bg-primaryDark text-white px-5 py-2.5 rounded-xl font-bold shadow-sm flex items-center gap-1 text-sm md:text-base transition-colors border-b-4 border-primaryDark">
                        <span>＋</span> 新增調查活動
                    </button>
                </div>
                <!-- 容器改為單欄的 flex-col，呈現條列式 -->
                <div id="activities-container" class="flex flex-col gap-4"></div>
            </section>

            <!-- 用戶管理區塊 -->
            <section id="view-users" class="hidden">
                <div class="mb-6 border-b-[3px] border-accent pb-3">
                    <h2 class="text-2xl md:text-4xl font-black text-textDark tracking-wider flex items-center">
                        <span class="title-icon">🦒</span> 用戶帳號管理
                    </h2>
                </div>
                
                <!-- 新增帳號 -->
                <div class="bg-white rounded-xl theme-border shadow-sm p-6 mb-6">
                    <h3 class="text-lg font-bold text-textDark mb-4 border-b-2 border-gray-100 pb-2">新增使用者 (學生/家長)</h3>
                    <div class="flex flex-wrap gap-4 items-end mb-6">
                        <div>
                            <label class="block text-sm font-bold mb-1 text-textDark">帳號</label>
                            <input type="text" id="input-new-username" class="p-2 border-2 border-accent rounded-xl w-32 md:w-48 bg-bgLight focus:outline-none focus:ring-2 focus:ring-primary/50">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-textDark">預設密碼</label>
                            <input type="text" id="input-new-password" class="p-2 border-2 border-accent rounded-xl w-32 md:w-48 bg-bgLight focus:outline-none focus:ring-2 focus:ring-primary/50">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-textDark">角色</label>
                            <select id="select-new-role" class="p-2 border-2 border-accent rounded-xl bg-bgLight focus:outline-none focus:ring-2 focus:ring-primary/50">
                                <option value="student">學生/家長</option>
                                <option value="collaborator">協作者</option>
                                <option value="admin">管理員</option>
                            </select>
                        </div>
                        <button id="btn-add-user" class="bg-primary text-white px-5 py-2.5 rounded-xl font-bold border-b-4 border-primaryDark active:border-b-0 active:translate-y-1 transition-all">新增單筆</button>
                        <span id="add-user-msg" class="text-sm font-bold ml-2"></span>
                    </div>

                    <!-- 大量匯入 -->
                    <div class="border-t-2 border-gray-100 pt-6 mt-2">
                        <h4 class="text-md font-bold text-textDark mb-2">批次大量匯入</h4>
                        <p class="text-xs text-gray-500 mb-2">請輸入 CSV 格式：<code>帳號,密碼,角色</code></p>
                        <textarea id="input-bulk-users" class="w-full p-3 border-2 border-accent rounded-xl mb-3 h-24 bg-bgLight focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="stu01,pwd123,student"></textarea>
                        <button id="btn-bulk-import" class="bg-info text-white px-5 py-2.5 rounded-xl font-bold border-b-4 border-blue-600 active:border-b-0 active:translate-y-1 transition-all">批次匯入</button>
                        <span id="bulk-import-msg" class="text-sm font-bold ml-2"></span>
                    </div>
                </div>

                <!-- 帳號列表 -->
                <div class="bg-white rounded-xl theme-border shadow-sm overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-bgLight border-b-2 border-accent">
                                <th class="p-4 font-bold text-textDark">帳號 (名稱)</th>
                                <th class="p-4 font-bold text-textDark">目前角色</th>
                                <th class="p-4 font-bold text-textDark">變更權限</th>
                                <th class="p-4 font-bold text-textDark">操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- 修改系統標題 Modal -->
    <div id="modal-edit-site-title" class="hidden fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm flex flex-col rounded-xl theme-border shadow-2xl">
            <div class="p-4 border-b-2 border-accent flex justify-between items-center bg-bgLight rounded-t-lg">
                <h3 class="text-lg font-bold text-textDark">修改系統標題</h3>
                <button id="btn-close-site-title-modal" class="text-2xl hover:text-danger font-bold">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2 text-textDark">新標題名稱</label>
                    <input type="text" id="input-site-title" class="w-full p-3 border-2 border-accent rounded-xl bg-white focus:outline-none focus:ring-4 focus:ring-primary/40" placeholder="例如：班級活動調查系統">
                </div>
                <button id="btn-save-site-title" class="w-full py-3 bg-primary hover:bg-primaryDark transition-colors text-white rounded-xl font-bold border-b-4 border-primaryDark">確認修改</button>
            </div>
        </div>
    </div>

    <!-- 檢視活動說明 Modal -->
    <div id="modal-view-activity" class="hidden fixed inset-0 modal-overlay z-[50] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] flex flex-col rounded-xl theme-border shadow-2xl">
            <div class="p-5 border-b-2 border-accent flex justify-between items-center bg-bgLight rounded-t-lg">
                <h3 id="view-title" class="text-xl md:text-2xl font-black text-textDark leading-snug flex items-center gap-2"></h3>
                <button id="btn-close-view-modal" class="text-3xl hover:text-danger font-bold">&times;</button>
            </div>
            <div class="p-3 bg-white border-b-2 border-dashed border-gray-200 px-6">
                <span id="view-deadline" class="text-sm font-bold tracking-wide"></span>
            </div>
            <div class="p-6 flex-grow overflow-y-auto activity-desc ql-editor bg-white" id="view-content"></div>
            <div class="p-5 border-t-2 border-accent flex justify-end bg-bgLight rounded-b-lg">
                <button id="btn-close-view-bottom" class="px-6 py-2.5 border-2 border-textDark text-textDark hover:bg-accent hover:text-white hover:border-accent transition-colors rounded-xl font-bold bg-white">關閉</button>
            </div>
        </div>
    </div>

    <!-- 管理員檢視報名結果 Modal -->
    <div id="modal-view-results" class="hidden fixed inset-0 modal-overlay z-[50] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] flex flex-col rounded-xl theme-border shadow-2xl">
            <div class="p-5 border-b-2 border-accent flex justify-between items-center bg-bgLight rounded-t-lg">
                <h3 id="results-title" class="text-lg md:text-xl font-bold text-textDark leading-snug"></h3>
                <button id="btn-close-results" class="text-3xl hover:text-danger font-bold">&times;</button>
            </div>
            <div class="p-4 bg-white flex justify-between items-center border-b-2 border-dashed border-gray-200">
                <div class="text-sm font-bold text-textDark bg-bgLight px-3 py-1.5 rounded-lg border border-accent" id="results-stats"></div>
                <button id="btn-export-csv" class="bg-info hover:bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm border-b-4 border-blue-700 active:border-b-0 active:translate-y-1 transition-all">匯出 Excel</button>
            </div>
            <div class="p-0 flex-grow overflow-y-auto bg-gray-50">
                <table class="w-full text-left border-collapse bg-white text-sm">
                    <thead>
                        <tr class="bg-bgLight border-b-2 border-accent">
                            <th class="p-4 font-bold text-textDark w-1/2">帳號 (名稱)</th>
                            <th class="p-4 font-bold text-textDark w-1/2">報名狀態</th>
                        </tr>
                    </thead>
                    <tbody id="results-table-body"></tbody>
                </table>
            </div>
            <div class="p-5 border-t-2 border-accent flex justify-end bg-bgLight rounded-b-lg">
                <button id="btn-close-results-bottom" class="px-6 py-2.5 border-2 border-textDark text-textDark hover:bg-gray-100 transition-colors rounded-xl font-bold bg-white">關閉</button>
            </div>
        </div>
    </div>

    <!-- 活動編輯 Modal -->
    <div id="modal-activity" class="hidden fixed inset-0 modal-overlay z-[50] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] flex flex-col rounded-xl theme-border shadow-2xl">
            <div class="p-5 border-b-2 border-accent flex justify-between items-center bg-bgLight rounded-t-lg">
                <h3 id="modal-edit-title" class="text-xl font-bold text-textDark flex items-center gap-2">新增/編輯活動</h3>
                <button id="btn-close-edit-modal" class="text-3xl hover:text-danger font-bold">&times;</button>
            </div>
            <div class="p-6 flex-grow overflow-y-auto">
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2 text-textDark">活動名稱 (標題)</label>
                    <input type="text" id="input-activity-title" class="w-full p-3 border-2 border-accent rounded-xl bg-bgLight focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/40 transition-all" placeholder="輸入標題">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2 text-textDark">填報期限</label>
                    <input type="date" id="input-activity-deadline" class="w-full p-3 border-2 border-accent rounded-xl bg-bgLight focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/40 transition-all">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2 text-textDark">活動說明 (支援多行與格式)</label>
                    <div id="editor-container" class="bg-white"></div>
                </div>
                
                <!-- 新增附件區塊 -->
                <div class="mb-2 border-t-2 border-dashed border-gray-200 pt-5 mt-5 bg-gray-50 -mx-6 px-6 pb-4">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-sm font-bold text-textDark flex items-center gap-2">📎 附件連結 (雲端硬碟或圖片網址)</label>
                        <button type="button" id="btn-add-attachment" class="text-info bg-white hover:bg-info hover:text-white border-2 border-info px-3 py-1.5 rounded-lg text-xs transition-colors font-bold shadow-sm">+ 新增附件</button>
                    </div>
                    <div id="attachments-edit-container" class="flex flex-col gap-3"></div>
                </div>
            </div>
            <div class="p-5 border-t-2 border-accent flex justify-end gap-3 bg-bgLight rounded-b-lg">
                <button id="btn-cancel-edit-modal" class="px-5 py-2.5 border-2 border-textDark text-textDark hover:bg-white rounded-xl font-bold transition-colors bg-transparent">取消</button>
                <button id="btn-save-activity" class="px-8 py-2.5 bg-primary hover:bg-primaryDark text-white rounded-xl font-bold transition-colors border-b-4 border-primaryDark">儲存</button>
            </div>
        </div>
    </div>

    <!-- 修改密碼 Modal -->
    <div id="modal-pwd" class="hidden fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm flex flex-col rounded-xl theme-border shadow-2xl">
            <div class="p-5 border-b-2 border-accent flex justify-between items-center bg-bgLight rounded-t-lg">
                <h3 class="text-lg font-bold text-textDark">修改密碼</h3>
                <button id="btn-close-pwd-modal" class="text-3xl hover:text-danger font-bold">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-5">
                    <label class="block text-sm font-bold mb-2 text-textDark">新密碼</label>
                    <input type="password" id="input-new-pwd" class="w-full p-3 border-2 border-accent rounded-xl bg-bgLight focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/40 transition-all" placeholder="輸入新密碼">
                </div>
                <p id="pwd-msg" class="text-sm font-bold mb-4 text-center"></p>
                <button id="btn-save-pwd" class="w-full py-3 bg-primary hover:bg-primaryDark transition-colors text-white rounded-xl font-bold border-b-4 border-primaryDark">確認修改</button>
            </div>
        </div>
    </div>

    <!-- 系統自訂 Alert/Confirm Modal -->
    <div id="modal-alert" class="hidden fixed inset-0 modal-overlay z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-xl theme-border shadow-2xl">
            <div class="p-4 border-b-2 border-accent bg-bgLight rounded-t-lg">
                <h3 id="modal-alert-title" class="text-lg font-bold text-textDark flex items-center gap-2">提示</h3>
            </div>
            <div class="p-6 bg-white">
                <p id="modal-alert-message" class="text-textDark font-bold whitespace-pre-wrap text-center"></p>
            </div>
            <div class="p-4 border-t-2 border-accent bg-bgLight flex justify-center gap-4 rounded-b-lg">
                <button id="btn-alert-cancel" class="hidden px-6 py-2 border-2 border-textDark text-textDark hover:bg-white rounded-xl font-bold bg-transparent">取消</button>
                <button id="btn-alert-confirm" class="px-8 py-2 bg-primary text-white hover:bg-primaryDark rounded-xl font-bold border-b-4 border-primaryDark">確定</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =====================================================================
        // 【明確的 Firebase 資料庫設定區塊】
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBKtmnwjdJZW-IbSd1fYEXUiKAifSHK4m4",
            authDomain: "signup-65cf0.firebaseapp.com",
            projectId: "signup-65cf0",
            storageBucket: "signup-65cf0.firebasestorage.app",
            messagingSenderId: "684504534674",
            appId: "1:684504534674:web:14ea67b603b234d166e04b"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wafu-school-app';
        // =====================================================================

        let fbUser = null;          
        let currentAppUser = null;  
        let appUsers = [];          
        let activities = [];        
        let registrations = [];
        let siteSettings = { siteTitle: '班級活動調查系統' }; 
        
        let unsubUsers, unsubActivities, unsubRegistrations, unsubSettings;
        let quillInstance = null; 
        let editingActivityId = null;
        let viewingResultsActivityId = null; 

        // 附件相關邏輯
        function createAttachmentRow(name = '', url = '') {
            const row = document.createElement('div');
            row.className = 'flex gap-2 items-center bg-white p-2 rounded-xl border border-gray-200 shadow-sm';
            row.innerHTML = `
                <input type="text" class="attach-name w-1/3 p-2 border-2 border-accent rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/40" placeholder="附件名稱 (如: 簡章)" value="${name}">
                <input type="url" class="attach-url w-2/3 p-2 border-2 border-accent rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/40" placeholder="貼上網址 (https://...)" value="${url}">
                <button type="button" class="btn-remove-attach text-danger hover:bg-danger hover:text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-lg transition-colors">&times;</button>
            `;
            return row;
        }

        document.getElementById('btn-add-attachment').addEventListener('click', () => {
            document.getElementById('attachments-edit-container').appendChild(createAttachmentRow());
        });

        document.getElementById('attachments-edit-container').addEventListener('click', (e) => {
            if(e.target.classList.contains('btn-remove-attach')) {
                e.target.closest('.flex').remove();
            }
        });

        const elLoading = document.getElementById('loading-screen');
        const elAuth = document.getElementById('auth-screen');
        const elApp = document.getElementById('app-screen');
        const authUsername = document.getElementById('auth-username');
        const authPassword = document.getElementById('auth-password');
        const authError = document.getElementById('auth-error');
        const btnSubmitAuth = document.getElementById('btn-submit-auth');

        const roleMap = { 'admin': '管理員', 'collaborator': '協作者', 'student': '學生/家長', 'guest': '訪客' };

        // 自訂 Alert/Confirm
        function showCustomAlert(message, isConfirm = false) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal-alert');
                const titleEl = document.getElementById('modal-alert-title');
                const msgEl = document.getElementById('modal-alert-message');
                const btnConfirm = document.getElementById('btn-alert-confirm');
                const btnCancel = document.getElementById('btn-alert-cancel');

                msgEl.innerText = message;
                titleEl.innerHTML = isConfirm ? "🦒 請確認" : "🦒 系統提示";
                
                if (isConfirm) {
                    btnCancel.classList.remove('hidden');
                } else {
                    btnCancel.classList.add('hidden');
                }
                
                modal.classList.remove('hidden');

                const cleanup = () => {
                    btnConfirm.removeEventListener('click', handleConfirm);
                    btnCancel.removeEventListener('click', handleCancel);
                    modal.classList.add('hidden');
                };

                const handleConfirm = () => { cleanup(); resolve(true); };
                const handleCancel = () => { cleanup(); resolve(false); };

                btnConfirm.addEventListener('click', handleConfirm);
                btnCancel.addEventListener('click', handleCancel);
            });
        }

        async function initSystem() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Init Error:", error);
                elLoading.innerHTML = `<h2 class="text-xl text-danger">系統初始化失敗</h2>`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                fbUser = user;
                startDataListeners();
            } else {
                stopDataListeners();
                fbUser = null; currentAppUser = null;
                setGuestMode(); 
            }
        });

        function startDataListeners() {
            if (!fbUser) return;
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'appUsers');
            const actRef = collection(db, 'artifacts', appId, 'public', 'data', 'activities');
            const regRef = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');

            unsubSettings = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().siteTitle) {
                    siteSettings.siteTitle = docSnap.data().siteTitle;
                }
                document.title = siteSettings.siteTitle;
                document.getElementById('nav-site-title').innerText = siteSettings.siteTitle;
                document.getElementById('auth-site-title').innerText = siteSettings.siteTitle;
            });

            unsubUsers = onSnapshot(usersRef, async (snapshot) => {
                appUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (appUsers.length === 0 && fbUser) {
                    try { await addDoc(usersRef, { username: 'admin', password: 'admin', role: 'admin', createdAt: Date.now() }); } catch (e) {}
                }
                checkAppSession();
                if(currentAppUser && currentAppUser.role === 'admin') renderUsers();
            });

            unsubActivities = onSnapshot(actRef, (snapshot) => {
                activities = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                activities.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                if(currentAppUser) renderActivities();
            });

            unsubRegistrations = onSnapshot(regRef, (snapshot) => {
                registrations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if(currentAppUser) renderActivities();
            });
        }

        function stopDataListeners() {
            if (unsubUsers) unsubUsers();
            if (unsubActivities) unsubActivities();
            if (unsubRegistrations) unsubRegistrations();
            if (unsubSettings) unsubSettings();
        }

        function checkAppSession() {
            if(elLoading.style.display !== 'none' && appUsers.length > 0) {
                elLoading.style.display = 'none';
                if (!currentAppUser) setGuestMode(); 
                else showScreen('app');
            }
            if (currentAppUser && currentAppUser.role !== 'guest') {
                const updatedUser = appUsers.find(u => u.id === currentAppUser.id);
                if (!updatedUser) setGuestMode();
                else if (updatedUser.role !== currentAppUser.role) {
                    currentAppUser = updatedUser;
                    setupAppUI();
                }
            }
        }

        function setGuestMode() {
            currentAppUser = { id: 'guest', username: '訪客', role: 'guest' };
            showScreen('app');
        }

        function showScreen(screen) {
            elLoading.classList.add('hidden'); elAuth.classList.add('hidden'); elApp.classList.add('hidden');
            if (screen === 'auth') elAuth.classList.remove('hidden');
            if (screen === 'app') { elApp.classList.remove('hidden'); setupAppUI(); }
        }

        document.getElementById('btn-nav-login').addEventListener('click', () => showScreen('auth'));
        document.getElementById('btn-back-to-app').addEventListener('click', () => showScreen('app'));
        document.getElementById('btn-logout').addEventListener('click', setGuestMode);

        btnSubmitAuth.addEventListener('click', () => {
            const username = authUsername.value.trim();
            const password = authPassword.value.trim();
            authError.classList.add('hidden');

            if (!username || !password) {
                authError.innerText = "請輸入帳號與密碼"; authError.classList.remove('hidden'); return;
            }

            const user = appUsers.find(u => u.username === username && u.password === password);
            if (user) {
                currentAppUser = user;
                authUsername.value = ''; authPassword.value = '';
                showScreen('app');
            } else {
                authError.innerText = "帳號或密碼錯誤"; authError.classList.remove('hidden');
            }
        });

        function setupAppUI() {
            document.getElementById('nav-username').innerText = currentAppUser.username;
            document.getElementById('nav-role').innerText = roleMap[currentAppUser.role];
            
            const adminNav = document.getElementById('admin-nav');
            const btnCreateActivity = document.getElementById('btn-create-activity');
            const btnEditSiteTitle = document.getElementById('btn-edit-site-title');
            const tabUsers = document.getElementById('tab-users');

            if (currentAppUser.role === 'guest') {
                document.getElementById('btn-nav-login').classList.remove('hidden');
                document.getElementById('btn-change-pwd-modal').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
                adminNav.classList.add('hidden');
                btnCreateActivity.classList.add('hidden');
                btnEditSiteTitle.classList.add('hidden');
            } else {
                document.getElementById('btn-nav-login').classList.add('hidden');
                document.getElementById('btn-change-pwd-modal').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                
                if (currentAppUser.role === 'admin' || currentAppUser.role === 'collaborator') {
                    adminNav.classList.remove('hidden');
                    btnCreateActivity.classList.remove('hidden');
                    tabUsers.classList.toggle('hidden', currentAppUser.role !== 'admin');
                    btnEditSiteTitle.classList.toggle('hidden', currentAppUser.role !== 'admin');
                } else {
                    adminNav.classList.add('hidden');
                    btnCreateActivity.classList.add('hidden');
                    btnEditSiteTitle.classList.add('hidden');
                }
            }
            switchTab('activities');
        }

        document.getElementById('tab-activities').addEventListener('click', () => switchTab('activities'));
        document.getElementById('tab-users').addEventListener('click', () => switchTab('users'));

        function switchTab(tab) {
            const vAct = document.getElementById('view-activities');
            const vUsr = document.getElementById('view-users');
            const tAct = document.getElementById('tab-activities');
            const tUsr = document.getElementById('tab-users');

            if (tab === 'activities') {
                vAct.classList.remove('hidden'); vUsr.classList.add('hidden');
                tAct.classList.add('border-b-4', 'border-primary', 'text-primary'); 
                tAct.classList.remove('border-transparent', 'text-gray-500');
                tUsr.classList.remove('border-b-4', 'border-primary', 'text-primary'); 
                tUsr.classList.add('border-transparent', 'text-gray-500');
                renderActivities(); 
            } else {
                vAct.classList.add('hidden'); vUsr.classList.remove('hidden');
                tUsr.classList.add('border-b-4', 'border-primary', 'text-primary'); 
                tUsr.classList.remove('border-transparent', 'text-gray-500');
                tAct.classList.remove('border-b-4', 'border-primary', 'text-primary'); 
                tAct.classList.add('border-transparent', 'text-gray-500');
                renderUsers();
            }
        }

        // 修改系統標題
        const modalEditSiteTitle = document.getElementById('modal-edit-site-title');
        document.getElementById('btn-edit-site-title').addEventListener('click', () => {
            document.getElementById('input-site-title').value = siteSettings.siteTitle;
            modalEditSiteTitle.classList.remove('hidden');
        });
        document.getElementById('btn-close-site-title-modal').addEventListener('click', () => modalEditSiteTitle.classList.add('hidden'));
        document.getElementById('btn-save-site-title').addEventListener('click', async () => {
            const newTitle = document.getElementById('input-site-title').value.trim();
            if (newTitle) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general'), { siteTitle: newTitle }, { merge: true });
                    modalEditSiteTitle.classList.add('hidden');
                } catch(e) {
                    await showCustomAlert("標題更新失敗：" + e.message);
                }
            }
        });

        // 條列式活動渲染
        function renderActivities() {
            const container = document.getElementById('activities-container');
            container.innerHTML = '';
            if (activities.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-600 font-bold bg-white/50 rounded-xl">🦒 尚無調查活動。</div>`; return;
            }

            activities.forEach(act => {
                const canEdit = currentAppUser.role === 'admin' || (currentAppUser.role === 'collaborator' && act.creatorId === currentAppUser.id);
                const userReg = registrations.find(r => r.activityId === act.id && r.userId === currentAppUser.id);
                const regStatus = userReg ? userReg.status : 'none';
                const totalParticipating = registrations.filter(r => r.activityId === act.id && r.status === 'participating').length;
                const isExpired = act.deadline && new Date(act.deadline + 'T23:59:59') < new Date();
                
                let deadlineText = "";
                if (act.deadline) {
                    // 修改：期限 -> 填報期限
                    deadlineText = `(填報期限：${act.deadline} ${isExpired ? '- 已截止' : ''})`;
                }

                let attachmentsHTML = "";
                if (act.attachments && act.attachments.length > 0) {
                    act.attachments.forEach(att => {
                        attachmentsHTML += `<a href="${att.url}" target="_blank" class="text-info hover:text-white hover:bg-info text-sm font-bold ml-1 md:ml-2 border border-info px-2 py-0.5 rounded-lg inline-flex items-center gap-1 transition-colors bg-white shadow-sm" title="${att.name.replace(/</g, "&lt;")}">📎 ${att.name.replace(/</g, "&lt;")}</a>`;
                    });
                }

                const listRow = document.createElement('div');
                listRow.className = "bg-white border-b-2 border-accent border-dashed p-4 md:p-5 rounded-xl shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:shadow-md transition-shadow";
                
                let rowHTML = `
                    <div class="flex items-center flex-wrap gap-x-2 gap-y-2 w-full md:w-auto">
                        <span class="text-primary text-xl">🌿</span>
                        <button class="btn-view-desc text-lg md:text-xl font-bold text-textDark hover:text-primary underline-offset-4 hover:underline text-left leading-snug transition-colors" data-id="${act.id}">
                            ${act.title.replace(/</g, "&lt;")}
                        </button>
                        ${attachmentsHTML}
                        <span class="text-sm font-bold ${isExpired ? 'text-danger' : 'text-gray-500'} ml-1 md:ml-3">
                            ${deadlineText}
                        </span>
                    </div>
                    
                    <div class="flex items-center gap-3 shrink-0 flex-wrap w-full md:w-auto mt-2 md:mt-0">
                `;

                if (isExpired) {
                    rowHTML += `<span class="text-gray-500 font-bold text-sm px-4 py-2 bg-gray-100 rounded-lg">已截止</span>`;
                } else if (currentAppUser.role === 'guest') {
                    rowHTML += `<button class="btn-goto-login px-5 py-2 text-sm font-bold rounded-xl bg-primary text-white border-b-4 border-primaryDark hover:bg-primaryDark active:border-b-0 active:translate-y-1 transition-all shadow-sm">填報</button>`;
                } else {
                    rowHTML += `
                        <div class="flex gap-2">
                            <button class="btn-reg-yes px-4 py-2 text-sm font-bold rounded-xl border-2 ${regStatus === 'participating' ? 'bg-primary text-white border-primary' : 'bg-white text-primary border-primary hover:bg-primary hover:text-white'} transition-colors shadow-sm" data-id="${act.id}">
                                ${regStatus === 'participating' ? '✓ 已參加' : '我要參加'}
                            </button>
                            <button class="btn-reg-no px-4 py-2 text-sm font-bold rounded-xl border-2 ${regStatus === 'not_participating' ? 'bg-gray-500 text-white border-gray-500' : 'bg-white text-gray-500 border-gray-500 hover:bg-gray-500 hover:text-white'} transition-colors shadow-sm" data-id="${act.id}">
                                ${regStatus === 'not_participating' ? '✗ 已婉拒' : '不參加'}
                            </button>
                        </div>
                    `;
                }

                if (canEdit) {
                    rowHTML += `
                        <div class="flex gap-2 border-l-2 border-gray-200 pl-4 ml-1">
                            <!-- 修改：按鈕字體放大為 text-base，並增加 padding (px-3 py-1.5) -->
                            <button class="btn-view-results text-info hover:text-white hover:bg-info border border-transparent hover:border-info px-3 py-1.5 rounded-lg font-bold text-base transition-colors" data-id="${act.id}" title="參加數：${totalParticipating}">📊 結果</button>
                            <button class="btn-edit text-accent hover:text-white hover:bg-accent border border-transparent hover:border-accent px-3 py-1.5 rounded-lg font-bold text-base transition-colors" data-id="${act.id}">編輯</button>
                            <button class="btn-delete text-danger hover:text-white hover:bg-danger border border-transparent hover:border-danger px-3 py-1.5 rounded-lg font-bold text-base transition-colors" data-id="${act.id}">刪除</button>
                        </div>
                    `;
                }

                rowHTML += `</div>`;
                listRow.innerHTML = rowHTML;
                container.appendChild(listRow);
            });
        }

        // 活動列表點擊事件處理
        document.getElementById('activities-container').addEventListener('click', async (e) => {
            const btn = e.target.closest('button') || e.target.closest('a');
            if (!btn || btn.tagName === 'A') return; // 如果點到超連結(附件)，瀏覽器自己會開新視窗

            if (btn.classList.contains('btn-goto-login')) {
                showScreen('auth');
                return;
            }

            if (btn.classList.contains('btn-view-desc')) {
                const actId = btn.getAttribute('data-id');
                const act = activities.find(a => a.id === actId);
                if (act) {
                    document.getElementById('view-title').innerText = act.title;
                    const isExpired = act.deadline && new Date(act.deadline + 'T23:59:59') < new Date();
                    const deadlineText = act.deadline ? `填報期限：${act.deadline}` : '無期限';
                    document.getElementById('view-deadline').innerText = `🗓 ${deadlineText} ${isExpired ? '(已截止)' : ''}`;
                    document.getElementById('view-deadline').className = `text-sm font-bold tracking-wide ${isExpired ? 'text-danger' : 'text-primaryDark'}`;
                    
                    let contentHtml = act.description || '';
                    
                    if (act.attachments && act.attachments.length > 0) {
                        contentHtml += `<div class="mt-8 pt-5 border-t-2 border-dashed border-accent bg-bgLight -mx-6 px-6 pb-2 rounded-b-lg">
                            <h4 class="font-bold text-textDark mb-3 flex items-center gap-2">📎 相關附件</h4>
                            <ul class="flex flex-wrap gap-3">`;
                        act.attachments.forEach(att => {
                            contentHtml += `<li><a href="${att.url}" target="_blank" class="text-info hover:text-white hover:bg-info font-bold bg-white border-2 border-info px-4 py-2 rounded-xl inline-flex items-center gap-2 shadow-sm transition-colors">🔗 ${att.name.replace(/</g, "&lt;")}</a></li>`;
                        });
                        contentHtml += `</ul></div>`;
                    }
                    
                    document.getElementById('view-content').innerHTML = contentHtml;
                    document.getElementById('modal-view-activity').classList.remove('hidden');
                }
                return;
            }

            if (btn.classList.contains('btn-view-results')) {
                const actId = btn.getAttribute('data-id');
                viewingResultsActivityId = actId;
                const act = activities.find(a => a.id === actId);
                if (act) {
                    document.getElementById('results-title').innerText = `📊 [${act.title}] 報名結果`;
                    
                    const tbody = document.getElementById('results-table-body');
                    tbody.innerHTML = '';
                    const actRegs = registrations.filter(r => r.activityId === actId);
                    
                    let participatingCount = 0;
                    actRegs.forEach(r => {
                        const user = appUsers.find(u => u.id === r.userId);
                        const username = user ? user.username : '(未知用戶)';
                        const isPart = r.status === 'participating';
                        if (isPart) participatingCount++;
                        
                        tbody.innerHTML += `
                            <tr class="border-b border-gray-100 hover:bg-bgLight transition-colors">
                                <td class="p-3">${username.replace(/</g, "&lt;")}</td>
                                <td class="p-3 font-bold ${isPart ? 'text-primary' : 'text-gray-500'}">
                                    ${isPart ? '✓ 已參加' : '✗ 已婉拒'}
                                </td>
                            </tr>
                        `;
                    });
                    
                    if (actRegs.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="2" class="p-5 text-center text-gray-500">尚無人回應</td></tr>`;
                    }
                    
                    document.getElementById('results-stats').innerText = `總回應數：${actRegs.length} | 已參加：${participatingCount}`;
                    document.getElementById('modal-view-results').classList.remove('hidden');
                }
                return;
            }

            const actId = btn.getAttribute('data-id');
            if (!actId) return;
            
            if (btn.classList.contains('btn-edit')) {
                openActivityModal(actId);
            }
            else if (btn.classList.contains('btn-delete')) {
                if (await showCustomAlert("確定要刪除這項活動嗎？此動作將連同報名紀錄一併清除。", true)) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activities', actId));
                }
            }
            else if (btn.classList.contains('btn-reg-yes') || btn.classList.contains('btn-reg-no')) {
                const desired = btn.classList.contains('btn-reg-yes') ? 'participating' : 'not_participating';
                const exReg = registrations.find(r => r.activityId === actId && r.userId === currentAppUser.id);
                if (exReg) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', exReg.id), { status: desired });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                        activityId: actId, userId: currentAppUser.id, status: desired, createdAt: Date.now()
                    });
                }
            }
        });

        document.getElementById('btn-close-view-modal').addEventListener('click', () => document.getElementById('modal-view-activity').classList.add('hidden'));
        document.getElementById('btn-close-view-bottom').addEventListener('click', () => document.getElementById('modal-view-activity').classList.add('hidden'));
        document.getElementById('btn-close-results').addEventListener('click', () => document.getElementById('modal-view-results').classList.add('hidden'));
        document.getElementById('btn-close-results-bottom').addEventListener('click', () => document.getElementById('modal-view-results').classList.add('hidden'));

        document.getElementById('btn-export-csv').addEventListener('click', () => {
            if (!viewingResultsActivityId) return;
            const act = activities.find(a => a.id === viewingResultsActivityId);
            if (!act) return;

            const actRegs = registrations.filter(r => r.activityId === viewingResultsActivityId);
            let csvContent = "\uFEFF活動名稱,學號/帳號(名稱),意願,回覆時間\n";
            
            actRegs.forEach(r => {
                const user = appUsers.find(u => u.id === r.userId);
                const username = user ? user.username : '(未知用戶)';
                const statusStr = r.status === 'participating' ? '已參加' : '已婉拒';
                const dateStr = new Date(r.createdAt).toLocaleString('zh-TW');
                csvContent += `"${act.title.replace(/"/g, '""')}","${username.replace(/"/g, '""')}","${statusStr}","${dateStr}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `${act.title}_報名結果.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 帳號管理 (Admin)
        function renderUsers() {
            if (!currentAppUser || currentAppUser.role !== 'admin') return;
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';
            appUsers.forEach(u => {
                const isSelf = u.id === currentAppUser.id;
                tbody.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-bgLight transition-colors">
                        <td class="p-4">${u.username.replace(/</g, "&lt;")} ${isSelf ? '<span class="text-xs text-primary font-bold">(自己)</span>' : ''}</td>
                        <td class="p-4">${roleMap[u.role]}</td>
                        <td class="p-4">
                            <select class="role-select p-2 border-2 border-accent rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/40 bg-white" data-id="${u.id}" ${isSelf ? 'disabled' : ''}>
                                <option value="student" ${u.role === 'student' ? 'selected' : ''}>學生/家長</option>
                                <option value="collaborator" ${u.role === 'collaborator' ? 'selected' : ''}>協作者</option>
                                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>管理員</option>
                            </select>
                        </td>
                        <td class="p-4">
                            ${!isSelf ? `<button class="btn-del-user text-danger font-bold text-sm hover:underline" data-id="${u.id}">刪除</button>` : ''}
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('users-table-body').addEventListener('change', async (e) => {
            if (e.target.classList.contains('role-select')) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', e.target.getAttribute('data-id')), { role: e.target.value });
            }
        });

        document.getElementById('users-table-body').addEventListener('click', async (e) => {
            if (e.target.classList.contains('btn-del-user')) {
                if(await showCustomAlert('確定刪除此帳號？', true)) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', e.target.getAttribute('data-id')));
                }
            }
        });

        document.getElementById('btn-add-user').addEventListener('click', async () => {
            const usr = document.getElementById('input-new-username').value.trim();
            const pwd = document.getElementById('input-new-password').value.trim();
            const role = document.getElementById('select-new-role').value;
            const msg = document.getElementById('add-user-msg');
            
            if (!usr || !pwd) { msg.textContent = '填寫不完整'; msg.className = 'text-danger text-sm font-bold ml-2'; return; }
            if (appUsers.some(u => u.username === usr)) { msg.textContent = '帳號已存在'; msg.className = 'text-danger text-sm font-bold ml-2'; return; }

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appUsers'), { username: usr, password: pwd, role: role, createdAt: Date.now() });
            msg.textContent = '新增成功！'; msg.className = 'text-primary text-sm font-bold ml-2';
            document.getElementById('input-new-username').value = ''; document.getElementById('input-new-password').value = '';
            setTimeout(() => msg.textContent = '', 3000);
        });

        document.getElementById('btn-bulk-import').addEventListener('click', async () => {
            const lines = document.getElementById('input-bulk-users').value.trim().split('\n');
            const msg = document.getElementById('bulk-import-msg');
            if (!lines[0]) { msg.textContent = '無資料'; msg.className = 'text-danger ml-2'; return; }
            
            let success = 0;
            for (const line of lines) {
                const [usr, pwd, role = 'student'] = line.split(',').map(s => s.trim());
                if (usr && pwd && !appUsers.some(u => u.username === usr)) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appUsers'), { username: usr, password: pwd, role: role, createdAt: Date.now() });
                    success++;
                }
            }
            msg.textContent = `匯入成功: ${success} 筆`; msg.className = 'text-primary font-bold text-sm ml-2';
            document.getElementById('input-bulk-users').value = '';
            setTimeout(() => msg.textContent = '', 4000);
        });

        const modalPwd = document.getElementById('modal-pwd');
        document.getElementById('btn-change-pwd-modal').addEventListener('click', () => {
            document.getElementById('input-new-pwd').value = '';
            document.getElementById('pwd-msg').textContent = '';
            modalPwd.classList.remove('hidden');
        });
        document.getElementById('btn-close-pwd-modal').addEventListener('click', () => modalPwd.classList.add('hidden'));
        
        document.getElementById('btn-save-pwd').addEventListener('click', async () => {
            const newPwd = document.getElementById('input-new-pwd').value.trim();
            const msg = document.getElementById('pwd-msg');
            if (!newPwd) { msg.textContent = '不能為空'; msg.className = 'text-danger'; return; }
            
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', currentAppUser.id), { password: newPwd });
                msg.textContent = '修改成功！即將關閉...'; msg.className = 'text-primary';
                setTimeout(() => modalPwd.classList.add('hidden'), 1500);
            } catch (e) {
                msg.textContent = '失敗: ' + e.message; msg.className = 'text-danger';
            }
        });

        function initEditor() {
            if (!quillInstance) {
                const toolbarOptions = [
                    [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }, { 'color': [] }],
                    ['bold', 'italic', 'underline'],
                    ['link']
                ];
                quillInstance = new Quill('#editor-container', {
                    modules: { toolbar: toolbarOptions },
                    theme: 'snow',
                    placeholder: '請在此輸入活動說明...'
                });
            }
        }

        const modalActivity = document.getElementById('modal-activity');
        function openActivityModal(actId = null) {
            initEditor();
            editingActivityId = actId;
            modalActivity.classList.remove('hidden');
            const attachContainer = document.getElementById('attachments-edit-container');
            attachContainer.innerHTML = ''; 

            if (actId) {
                document.getElementById('modal-edit-title').innerHTML = "🦒 修改活動";
                const act = activities.find(a => a.id === actId);
                document.getElementById('input-activity-title').value = act.title;
                document.getElementById('input-activity-deadline').value = act.deadline || '';
                quillInstance.root.innerHTML = act.description || '';
                
                if (act.attachments && act.attachments.length > 0) {
                    act.attachments.forEach(att => attachContainer.appendChild(createAttachmentRow(att.name, att.url)));
                }
            } else {
                document.getElementById('modal-edit-title').innerHTML = "🦒 新增活動";
                document.getElementById('input-activity-title').value = '';
                document.getElementById('input-activity-deadline').value = '';
                quillInstance.root.innerHTML = '';
            }
        }

        document.getElementById('btn-create-activity').addEventListener('click', () => openActivityModal());
        document.getElementById('btn-close-edit-modal').addEventListener('click', () => modalActivity.classList.add('hidden'));
        document.getElementById('btn-cancel-edit-modal').addEventListener('click', () => modalActivity.classList.add('hidden'));

        document.getElementById('btn-save-activity').addEventListener('click', async () => {
            const title = document.getElementById('input-activity-title').value.trim();
            const deadline = document.getElementById('input-activity-deadline').value;
            const desc = quillInstance.root.innerHTML;
            
            const attachNames = document.querySelectorAll('.attach-name');
            const attachUrls = document.querySelectorAll('.attach-url');
            const attachments = [];
            for (let i = 0; i < attachNames.length; i++) {
                const n = attachNames[i].value.trim();
                const u = attachUrls[i].value.trim();
                if (n || u) {
                    attachments.push({ name: n || '未命名附件', url: u });
                }
            }
            
            if (!title) {
                await showCustomAlert("請填寫活動名稱！");
                return;
            }

            const btn = document.getElementById('btn-save-activity');
            btn.disabled = true; btn.innerText = '儲存中...';

            try {
                if (editingActivityId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activities', editingActivityId), { 
                        title: title, 
                        deadline: deadline, 
                        description: desc, 
                        attachments: attachments,
                        updatedAt: Date.now() 
                    });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'activities'), {
                        title: title, 
                        deadline: deadline, 
                        description: desc, 
                        attachments: attachments,
                        creatorId: currentAppUser.id, 
                        createdAt: Date.now()
                    });
                }
                modalActivity.classList.add('hidden');
                btn.disabled = false; btn.innerText = '儲存';
            } catch(e) {
                btn.disabled = false; btn.innerText = '儲存';
                await showCustomAlert("儲存失敗: " + e.message);
            }
        });

        initSystem();
    </script>
</body>
</html>

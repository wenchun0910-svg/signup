<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級活動調查系統</title>
    
    <!-- Google Fonts: Noto Serif TC for Japanese/Traditional Chinese elegant look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        washi: '#f4f0e6',      // 傳統和紙顏色
                        matcha: '#6b8e23',     // 抹茶綠
                        matchaDark: '#55711b',
                        sumi: '#2b2b2b',       // 墨色 (文字)
                        shu: '#c73e3a',        // 朱紅色 (警告/刪除)
                        asagi: '#00a3af',      // 淺蔥色 (資訊/按鈕)
                        kin: '#c4a052',        // 金色 (裝飾)
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- Quill (Rich Text Editor) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        body {
            background-color: #f4f0e6;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h100v100H0z" fill="%23f4f0e6"/><path d="M0 0l50 50L0 100zm100 0L50 50l50 50z" stroke="%23ebdcc2" fill="none" opacity="0.3"/></svg>');
            color: #2b2b2b;
        }
        .japanese-border { border: 2px solid #c4a052; padding: 4px; background-clip: content-box; }
        .card-shadow { box-shadow: 4px 4px 0px 0px rgba(196, 160, 82, 0.2); }
        .hidden { display: none !important; }
        .modal-overlay { background-color: rgba(43, 43, 43, 0.8); }
        
        /* 自訂 Quill 編輯器樣式 */
        .ql-toolbar.ql-snow {
            border: 2px dashed #c4a052 !important;
            border-bottom: none !important;
            border-radius: 4px 4px 0 0;
            background-color: rgba(255, 255, 255, 0.5) !important;
            font-family: 'Noto Serif TC', serif;
        }
        .ql-container.ql-snow {
            border: 2px dashed #c4a052 !important;
            border-radius: 0 0 4px 4px;
            background-color: transparent !important;
            font-family: 'Noto Serif TC', serif;
            font-size: 16px;
            height: 250px;
        }
        
        /* 檢視模式的 Quill 樣式 */
        .ql-editor { white-space: pre-wrap; }
        .activity-desc table { border-collapse: collapse; width: 100%; }
        .activity-desc table th, .activity-desc table td { border: 1px solid #c4a052; padding: 8px; }
        
        /* 標題圖示 */
        .title-icon { font-size: 1.2em; line-height: 1; margin-right: 4px; }
    </style>
</head>
<body class="font-serif min-h-screen flex flex-col">

    <!-- 全域載入提示 -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center bg-washi z-50">
        <div class="text-center">
            <div class="text-4xl text-matcha mb-4 animate-pulse">✿</div>
            <h2 class="text-xl font-bold text-sumi">系統連線中...</h2>
        </div>
    </div>

    <!-- 登入畫面 -->
    <div id="auth-screen" class="hidden flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-sm japanese-border card-shadow max-w-md w-full relative mt-8">
            <div id="auth-site-title" class="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-washi px-4 py-1 border-2 border-kin text-kin font-bold rounded-full whitespace-nowrap">
                班級活動調查系統
            </div>
            <h2 class="text-3xl font-bold text-center mb-6 mt-4 text-sumi border-b-2 border-matcha pb-2">系統登入</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2">帳號 (學號/管理員帳號)</label>
                <input type="text" id="auth-username" class="w-full p-2 border border-kin focus:outline-none focus:ring-2 focus:ring-matcha bg-washi rounded-sm" placeholder="請輸入帳號">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2">密碼</label>
                <input type="password" id="auth-password" class="w-full p-2 border border-kin focus:outline-none focus:ring-2 focus:ring-matcha bg-washi rounded-sm" placeholder="請輸入密碼">
            </div>
            
            <p id="auth-error" class="text-shu text-sm mb-4 hidden text-center font-bold"></p>
            
            <button id="btn-submit-auth" class="w-full bg-matcha hover:bg-matchaDark text-white font-bold py-2 px-4 rounded-sm transition-colors mb-4 border border-matchaDark shadow-sm">
                登入
            </button>
            <button id="btn-back-to-app" class="w-full bg-washi hover:bg-kin hover:text-white text-sumi font-bold py-2 px-4 rounded-sm transition-colors mb-4 border border-kin shadow-sm">
                返回活動列表 (訪客瀏覽)
            </button>
            <p class="text-xs text-gray-400 text-center mt-2 border-t border-gray-200 pt-2">註：系統初始會自動建立 admin / admin 帳號，其餘需由管理員匯入。</p>
        </div>
    </div>

    <!-- 應用程式主畫面 -->
    <div id="app-screen" class="hidden flex-grow flex flex-col">
        <!-- 導覽列 -->
        <header class="bg-white border-b-4 border-matcha shadow-sm sticky top-0 z-30">
            <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl md:text-3xl text-matcha hidden sm:inline">✿</span>
                    <h1 class="text-lg md:text-xl font-black tracking-widest text-sumi flex items-center gap-2">
                        <span id="nav-site-title">班級活動調查系統</span>
                        <!-- 管理者修改標題的按鈕 -->
                        <button id="btn-edit-site-title" class="hidden text-sm text-kin hover:text-matcha transition-colors" title="修改系統標題">
                            ✏️
                        </button>
                    </h1>
                </div>
                <div class="flex items-center gap-2 md:gap-4 shrink-0">
                    <div class="text-right hidden sm:block">
                        <div class="text-sm font-bold text-sumi" id="nav-username">使用者</div>
                        <div class="text-xs text-asagi" id="nav-role">角色</div>
                    </div>
                    <!-- 訪客登入 / 修改密碼與登出 -->
                    <button id="btn-nav-login" class="bg-matcha hover:bg-matchaDark text-white px-3 md:px-4 py-1.5 rounded-sm text-xs md:text-sm transition-colors font-bold shadow-sm hidden">
                        系統登入
                    </button>
                    <button id="btn-change-pwd-modal" class="bg-washi border border-kin text-sumi hover:bg-kin hover:text-white px-2 md:px-3 py-1 rounded-sm text-xs md:text-sm transition-colors font-bold">
                        改密碼
                    </button>
                    <button id="btn-logout" class="bg-washi border border-kin text-sumi hover:bg-kin hover:text-white px-2 md:px-3 py-1 rounded-sm text-xs md:text-sm transition-colors font-bold">
                        登出
                    </button>
                </div>
            </div>
        </header>

        <!-- 選單列 (針對管理者和協作者) -->
        <nav id="admin-nav" class="bg-washi border-b border-kin hidden">
            <div class="max-w-6xl mx-auto px-4 flex gap-4 overflow-x-auto">
                <button id="tab-activities" class="py-2 px-4 border-b-2 border-matcha text-matcha font-bold whitespace-nowrap">調查列表</button>
                <button id="tab-users" class="py-2 px-4 border-b-2 border-transparent text-gray-500 hover:text-matcha font-bold hidden whitespace-nowrap">用戶管理 (管理員)</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-grow">
            <!-- 活動列表區塊 -->
            <section id="view-activities">
                <!-- 移除了舊版的大標題，只保留新增按鈕 (靠右對齊) -->
                <div class="flex justify-end mb-4 pb-2">
                    <button id="btn-create-activity" class="hidden bg-matcha hover:bg-matchaDark text-white px-4 py-2 rounded-sm font-bold shadow-sm flex items-center gap-1 text-sm md:text-base transition-colors">
                        <span>＋</span> 新增調查活動
                    </button>
                </div>
                <!-- 容器改為單欄的 flex-col，呈現條列式 -->
                <div id="activities-container" class="flex flex-col gap-3"></div>
            </section>

            <!-- 用戶管理區塊 -->
            <section id="view-users" class="hidden">
                <div class="mb-6 border-b-[3px] border-kin pb-3">
                    <h2 class="text-2xl md:text-4xl font-black text-sumi tracking-wider flex items-center">
                        <span class="title-icon text-sumi">✿</span> 用戶帳號管理
                    </h2>
                </div>
                
                <!-- 新增帳號 -->
                <div class="bg-white rounded-sm japanese-border shadow-sm p-4 mb-6">
                    <h3 class="text-lg font-bold text-sumi mb-4 border-b border-gray-200 pb-2">新增使用者 (學生/家長)</h3>
                    <div class="flex flex-wrap gap-4 items-end mb-6">
                        <div>
                            <label class="block text-sm font-bold mb-1">帳號</label>
                            <input type="text" id="input-new-username" class="p-2 border border-kin rounded-sm w-32 md:w-48 bg-washi">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">預設密碼</label>
                            <input type="text" id="input-new-password" class="p-2 border border-kin rounded-sm w-32 md:w-48 bg-washi">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">角色</label>
                            <select id="select-new-role" class="p-2 border border-kin rounded-sm bg-washi">
                                <option value="student">學生/家長</option>
                                <option value="collaborator">協作者</option>
                                <option value="admin">管理員</option>
                            </select>
                        </div>
                        <button id="btn-add-user" class="bg-matcha text-white px-4 py-2 rounded-sm font-bold">新增單筆</button>
                        <span id="add-user-msg" class="text-sm font-bold ml-2"></span>
                    </div>

                    <!-- 大量匯入 -->
                    <div class="border-t border-gray-200 pt-4">
                        <h4 class="text-md font-bold text-sumi mb-2">批次大量匯入</h4>
                        <p class="text-xs text-gray-500 mb-2">請輸入 CSV 格式：<code>帳號,密碼,角色</code></p>
                        <textarea id="input-bulk-users" class="w-full p-2 border border-kin rounded-sm mb-2 h-24 bg-washi" placeholder="stu01,pwd123,student"></textarea>
                        <button id="btn-bulk-import" class="bg-asagi text-white px-4 py-2 rounded-sm font-bold">批次匯入</button>
                        <span id="bulk-import-msg" class="text-sm font-bold ml-2"></span>
                    </div>
                </div>

                <!-- 帳號列表 -->
                <div class="bg-white rounded-sm japanese-border shadow-sm overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-washi border-b border-kin">
                                <th class="p-3 font-bold">帳號 (名稱)</th>
                                <th class="p-3 font-bold">目前角色</th>
                                <th class="p-3 font-bold">變更權限</th>
                                <th class="p-3 font-bold">操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- 修改系統標題 Modal -->
    <div id="modal-edit-site-title" class="hidden fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm flex flex-col rounded-sm japanese-border">
            <div class="p-4 border-b border-kin flex justify-between items-center bg-washi">
                <h3 class="text-lg font-bold text-sumi">修改系統標題</h3>
                <button id="btn-close-site-title-modal" class="text-xl hover:text-shu">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">新標題名稱</label>
                    <input type="text" id="input-site-title" class="w-full p-2 border border-kin rounded-sm bg-washi focus:outline-none focus:border-matcha" placeholder="例如：班級活動調查系統">
                </div>
                <button id="btn-save-site-title" class="w-full py-2 bg-matcha hover:bg-matchaDark transition-colors text-white rounded-sm font-bold">確認修改</button>
            </div>
        </div>
    </div>

    <!-- 檢視活動說明 Modal (點擊開啟新視窗) -->
    <div id="modal-view-activity" class="hidden fixed inset-0 modal-overlay z-[50] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] flex flex-col rounded-sm japanese-border shadow-2xl">
            <div class="p-4 border-b border-kin flex justify-between items-center bg-washi">
                <h3 id="view-title" class="text-xl md:text-2xl font-black text-sumi leading-snug"></h3>
                <button id="btn-close-view-modal" class="text-2xl hover:text-shu transition-colors">&times;</button>
            </div>
            <div class="p-2 bg-gray-50 border-b border-kin px-6">
                <span id="view-deadline" class="text-sm font-bold tracking-wide"></span>
            </div>
            <div class="p-6 flex-grow overflow-y-auto activity-desc ql-editor bg-white" id="view-content"></div>
            <div class="p-4 border-t border-kin flex justify-end bg-washi">
                <button id="btn-close-view-bottom" class="px-6 py-2 border-2 border-sumi text-sumi hover:bg-kin hover:text-white hover:border-kin transition-colors rounded-sm font-bold">關閉</button>
            </div>
        </div>
    </div>

    <!-- 管理員檢視報名結果 Modal -->
    <div id="modal-view-results" class="hidden fixed inset-0 modal-overlay z-[50] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] flex flex-col rounded-sm japanese-border shadow-2xl">
            <div class="p-4 border-b border-kin flex justify-between items-center bg-washi">
                <h3 id="results-title" class="text-lg md:text-xl font-bold text-sumi leading-snug"></h3>
                <button id="btn-close-results" class="text-2xl hover:text-shu transition-colors">&times;</button>
            </div>
            <div class="p-4 bg-white flex justify-between items-center border-b border-gray-200">
                <div class="text-sm font-bold text-sumi" id="results-stats"></div>
                <button id="btn-export-csv" class="bg-asagi hover:bg-blue-600 text-white px-3 py-1.5 rounded-sm font-bold text-sm shadow-sm transition-colors">匯出 Excel (CSV)</button>
            </div>
            <div class="p-4 flex-grow overflow-y-auto bg-gray-50">
                <table class="w-full text-left border-collapse bg-white shadow-sm text-sm">
                    <thead>
                        <tr class="bg-washi border-b border-kin">
                            <th class="p-2 font-bold w-1/2">帳號 (名稱)</th>
                            <th class="p-2 font-bold w-1/2">報名狀態</th>
                        </tr>
                    </thead>
                    <tbody id="results-table-body"></tbody>
                </table>
            </div>
            <div class="p-4 border-t border-kin flex justify-end bg-washi">
                <button id="btn-close-results-bottom" class="px-4 py-2 border border-sumi text-sumi hover:bg-gray-100 transition-colors rounded-sm font-bold">關閉</button>
            </div>
        </div>
    </div>

    <!-- 活動編輯 Modal (管理員/協作者專用) -->
    <div id="modal-activity" class="hidden fixed inset-0 modal-overlay z-[50] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] flex flex-col rounded-sm japanese-border">
            <div class="p-4 border-b border-kin flex justify-between items-center bg-washi">
                <h3 id="modal-edit-title" class="text-xl font-bold text-sumi">新增/編輯活動</h3>
                <button id="btn-close-edit-modal" class="text-2xl hover:text-shu">&times;</button>
            </div>
            <div class="p-6 flex-grow overflow-y-auto">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-sumi">活動名稱 (標題)</label>
                    <input type="text" id="input-activity-title" class="w-full p-2 border border-kin rounded-sm focus:outline-none focus:border-matcha" placeholder="輸入標題">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-sumi">填報期限</label>
                    <input type="date" id="input-activity-deadline" class="w-full p-2 border border-kin rounded-sm bg-washi focus:outline-none focus:border-matcha">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-sumi">活動說明 (支援多行與格式)</label>
                    <div id="editor-container"></div>
                </div>
                
                <!-- 新增附件區塊 -->
                <div class="mb-2 border-t border-kin pt-4 mt-4">
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-bold text-sumi flex items-center gap-1">📎 附件連結 (雲端硬碟或圖片網址)</label>
                        <button type="button" id="btn-add-attachment" class="text-asagi hover:text-white hover:bg-asagi border border-asagi px-2 py-1 rounded-sm text-xs transition-colors font-bold">+ 新增附件</button>
                    </div>
                    <div id="attachments-edit-container" class="flex flex-col gap-2"></div>
                </div>
            </div>
            <div class="p-4 border-t border-kin flex justify-end gap-3 bg-washi">
                <button id="btn-cancel-edit-modal" class="px-4 py-2 border border-sumi text-sumi hover:bg-gray-100 rounded-sm font-bold transition-colors">取消</button>
                <button id="btn-save-activity" class="px-6 py-2 bg-matcha hover:bg-matchaDark text-white rounded-sm font-bold transition-colors">儲存</button>
            </div>
        </div>
    </div>

    <!-- 修改密碼 Modal -->
    <div id="modal-pwd" class="hidden fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm flex flex-col rounded-sm japanese-border">
            <div class="p-4 border-b border-kin flex justify-between items-center bg-washi">
                <h3 class="text-lg font-bold text-sumi">修改密碼</h3>
                <button id="btn-close-pwd-modal" class="text-xl hover:text-shu">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">新密碼</label>
                    <input type="password" id="input-new-pwd" class="w-full p-2 border border-kin rounded-sm bg-washi focus:outline-none focus:border-matcha" placeholder="輸入新密碼">
                </div>
                <p id="pwd-msg" class="text-sm font-bold mb-4 text-center"></p>
                <button id="btn-save-pwd" class="w-full py-2 bg-matcha hover:bg-matchaDark transition-colors text-white rounded-sm font-bold">確認修改</button>
            </div>
        </div>
    </div>

    <!-- 系統自訂 Alert/Confirm Modal -->
    <div id="modal-alert" class="hidden fixed inset-0 modal-overlay z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-sm japanese-border shadow-lg">
            <div class="p-4 border-b border-kin bg-washi">
                <h3 id="modal-alert-title" class="text-lg font-bold text-sumi">提示</h3>
            </div>
            <div class="p-6">
                <p id="modal-alert-message" class="text-sumi font-bold whitespace-pre-wrap"></p>
            </div>
            <div class="p-4 border-t border-kin bg-washi flex justify-end gap-3">
                <button id="btn-alert-cancel" class="hidden px-4 py-2 border border-sumi text-sumi hover:bg-gray-100 rounded-sm font-bold">取消</button>
                <button id="btn-alert-confirm" class="px-4 py-2 bg-matcha text-white hover:bg-matchaDark rounded-sm font-bold">確定</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =====================================================================
        // 【明確的 Firebase 資料庫設定區塊】
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBKtmnwjdJZW-IbSd1fYEXUiKAifSHK4m4",
            authDomain: "signup-65cf0.firebaseapp.com",
            projectId: "signup-65cf0",
            storageBucket: "signup-65cf0.firebasestorage.app",
            messagingSenderId: "684504534674",
            appId: "1:684504534674:web:14ea67b603b234d166e04b"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wafu-school-app';
        // =====================================================================

        let fbUser = null;          
        let currentAppUser = null;  
        let appUsers = [];          
        let activities = [];        
        let registrations = [];
        let siteSettings = { siteTitle: '班級活動調查系統' }; // 全局設定
        
        let unsubUsers, unsubActivities, unsubRegistrations, unsubSettings;
        let quillInstance = null; 
        let editingActivityId = null;
        let viewingResultsActivityId = null; 

        // 附件相關邏輯
        function createAttachmentRow(name = '', url = '') {
            const row = document.createElement('div');
            row.className = 'flex gap-2 items-center';
            row.innerHTML = `
                <input type="text" class="attach-name w-1/3 p-2 border border-kin rounded-sm text-sm focus:outline-none focus:border-matcha" placeholder="附件名稱 (如: 簡章)" value="${name}">
                <input type="url" class="attach-url w-2/3 p-2 border border-kin rounded-sm text-sm focus:outline-none focus:border-matcha" placeholder="貼上網址 (https://...)" value="${url}">

        const elLoading = document.getElementById('loading-screen');
        const elAuth = document.getElementById('auth-screen');
        const elApp = document.getElementById('app-screen');
        const authUsername = document.getElementById('auth-username');
        const authPassword = document.getElementById('auth-password');
        const authError = document.getElementById('auth-error');
        const btnSubmitAuth = document.getElementById('btn-submit-auth');

        const roleMap = { 'admin': '管理員', 'collaborator': '協作者', 'student': '學生/家長', 'guest': '訪客' };

        // 自訂 Alert/Confirm 邏輯機制
        function showCustomAlert(message, isConfirm = false) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal-alert');
                const titleEl = document.getElementById('modal-alert-title');
                const msgEl = document.getElementById('modal-alert-message');
                const btnConfirm = document.getElementById('btn-alert-confirm');
                const btnCancel = document.getElementById('btn-alert-cancel');

                msgEl.innerText = message;
                titleEl.innerText = isConfirm ? "請確認" : "系統提示";
                
                if (isConfirm) {
                    btnCancel.classList.remove('hidden');
                } else {
                    btnCancel.classList.add('hidden');
                }
                
                modal.classList.remove('hidden');

                const cleanup = () => {
                    btnConfirm.removeEventListener('click', handleConfirm);
                    btnCancel.removeEventListener('click', handleCancel);
                    modal.classList.add('hidden');
                };

                const handleConfirm = () => { cleanup(); resolve(true); };
                const handleCancel = () => { cleanup(); resolve(false); };

                btnConfirm.addEventListener('click', handleConfirm);
                btnCancel.addEventListener('click', handleCancel);
            });
        }

        async function initSystem() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Init Error:", error);
                elLoading.innerHTML = `<h2 class="text-xl text-shu">系統初始化失敗</h2>`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                fbUser = user;
                startDataListeners();
            } else {
                stopDataListeners();
                fbUser = null; currentAppUser = null;
                setGuestMode(); 
            }
        });

        function startDataListeners() {
            if (!fbUser) return;
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'appUsers');
            const actRef = collection(db, 'artifacts', appId, 'public', 'data', 'activities');
            const regRef = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');

            // 監聽全局設定 (如系統標題)
            unsubSettings = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().siteTitle) {
                    siteSettings.siteTitle = docSnap.data().siteTitle;
                }
                // 更新畫面上的標題
                document.title = siteSettings.siteTitle;
                document.getElementById('nav-site-title').innerText = siteSettings.siteTitle;
                document.getElementById('auth-site-title').innerText = siteSettings.siteTitle;
            });

            unsubUsers = onSnapshot(usersRef, async (snapshot) => {
                appUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (appUsers.length === 0 && fbUser) {
                    try { await addDoc(usersRef, { username: 'admin', password: 'admin', role: 'admin', createdAt: Date.now() }); } catch (e) {}
                }
                checkAppSession();
                if(currentAppUser && currentAppUser.role === 'admin') renderUsers();
            });

            unsubActivities = onSnapshot(actRef, (snapshot) => {
                activities = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                activities.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                if(currentAppUser) renderActivities();
            });

            unsubRegistrations = onSnapshot(regRef, (snapshot) => {
                registrations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if(currentAppUser) renderActivities();
            });
        }

        function stopDataListeners() {
            if (unsubUsers) unsubUsers();
            if (unsubActivities) unsubActivities();
            if (unsubRegistrations) unsubRegistrations();
            if (unsubSettings) unsubSettings();
        }

        function checkAppSession() {
            if(elLoading.style.display !== 'none' && appUsers.length > 0) {
                elLoading.style.display = 'none';
                if (!currentAppUser) setGuestMode(); 
                else showScreen('app');
            }
            if (currentAppUser && currentAppUser.role !== 'guest') {
                const updatedUser = appUsers.find(u => u.id === currentAppUser.id);
                if (!updatedUser) setGuestMode();
                else if (updatedUser.role !== currentAppUser.role) {
                    currentAppUser = updatedUser;
                    setupAppUI();
                }
            }
        }

        function setGuestMode() {
            currentAppUser = { id: 'guest', username: '訪客', role: 'guest' };
            showScreen('app');
        }

        function showScreen(screen) {
            elLoading.classList.add('hidden'); elAuth.classList.add('hidden'); elApp.classList.add('hidden');
            if (screen === 'auth') elAuth.classList.remove('hidden');
            if (screen === 'app') { elApp.classList.remove('hidden'); setupAppUI(); }
        }

        // 登入事件處理
        document.getElementById('btn-nav-login').addEventListener('click', () => showScreen('auth'));
        document.getElementById('btn-back-to-app').addEventListener('click', () => showScreen('app'));
        document.getElementById('btn-logout').addEventListener('click', setGuestMode);

        btnSubmitAuth.addEventListener('click', () => {
            const username = authUsername.value.trim();
            const password = authPassword.value.trim();
            authError.classList.add('hidden');

            if (!username || !password) {
                authError.innerText = "請輸入帳號與密碼"; authError.classList.remove('hidden'); return;
            }

            const user = appUsers.find(u => u.username === username && u.password === password);
            if (user) {
                currentAppUser = user;
                authUsername.value = ''; authPassword.value = '';
                showScreen('app');
            } else {
                authError.innerText = "帳號或密碼錯誤"; authError.classList.remove('hidden');
            }
        });

        function setupAppUI() {
            document.getElementById('nav-username').innerText = currentAppUser.username;
            document.getElementById('nav-role').innerText = roleMap[currentAppUser.role];
            
            const adminNav = document.getElementById('admin-nav');
            const btnCreateActivity = document.getElementById('btn-create-activity');
            const btnEditSiteTitle = document.getElementById('btn-edit-site-title');
            const tabUsers = document.getElementById('tab-users');

            if (currentAppUser.role === 'guest') {
                document.getElementById('btn-nav-login').classList.remove('hidden');
                document.getElementById('btn-change-pwd-modal').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
                adminNav.classList.add('hidden');
                btnCreateActivity.classList.add('hidden');
                btnEditSiteTitle.classList.add('hidden');
            } else {
                document.getElementById('btn-nav-login').classList.add('hidden');
                document.getElementById('btn-change-pwd-modal').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                
                if (currentAppUser.role === 'admin' || currentAppUser.role === 'collaborator') {
                    adminNav.classList.remove('hidden');
                    btnCreateActivity.classList.remove('hidden');

                } else {

                    btnCreateActivity.classList.add('hidden');
                    btnEditSiteTitle.classList.add('hidden');
                }
            }
            switchTab('activities');

        document.getElementById('tab-activities').addEventListener('click', () => switchTab('activities'));
        document.getElementById('tab-users').addEventListener('click', () => switchTab('users'));

        function switchTab(tab) {
            const vAct = document.getElementById('view-activities');
            const vUsr = document.getElementById('view-users');
            const tAct = document.getElementById('tab-activities');
            const tUsr = document.getElementById('tab-users');

            if (tab === 'activities') {
                vAct.classList.remove('hidden'); vUsr.classList.add('hidden');
                tAct.classList.add('border-matcha', 'text-matcha'); tAct.classList.remove('border-transparent', 'text-gray-500');

            } else {
                vAct.classList.add('hidden'); vUsr.classList.remove('hidden');
                tUsr.classList.add('border-matcha', 'text-matcha'); tUsr.classList.remove('border-transparent', 'text-gray-500');
                tAct.classList.remove('border-matcha', 'text-matcha'); tAct.classList.add('border-transparent', 'text-gray-500');
                renderUsers();
            }

        // 條列式活動渲染
        function renderActivities() {
            const container = document.getElementById('activities-container');
            container.innerHTML = '';
            if (activities.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500">尚無調查活動。</div>`; return;
            }

            activities.forEach(act => {
                const canEdit = currentAppUser.role === 'admin' || (currentAppUser.role === 'collaborator' && act.creatorId === currentAppUser.id);
                const userReg = registrations.find(r => r.activityId === act.id && r.userId === currentAppUser.id);
                const regStatus = userReg ? userReg.status : 'none';
                const totalParticipating = registrations.filter(r => r.activityId === act.id && r.status === 'participating').length;
                const isExpired = act.deadline && new Date(act.deadline + 'T23:59:59') < new Date();
                
                let deadlineText = "";
                if (act.deadline) {
                    deadlineText = `(期限：${act.deadline} ${isExpired ? '- 已截止' : ''})`;
                }

                const listRow = document.createElement('div');
                // 使用簡潔的條列式背景與底線
                listRow.className = "bg-white border-b-2 border-kin border-dashed p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:bg-washi/40 transition-colors";
                
                let rowHTML = `
                    <div class="flex items-center flex-wrap gap-x-2 gap-y-1 w-full md:w-auto">
                        <span class="text-kin text-sm">❁</span>
                        <!-- 將名稱改為可點擊超連結，點擊觸發 btn-view-desc -->
                        <button class="btn-view-desc text-lg md:text-xl font-bold text-sumi hover:text-matcha underline-offset-4 hover:underline text-left leading-snug transition-colors" data-id="${act.id}">
                            ${act.title.replace(/</g, "&lt;")}
                        </button>
                        <span class="text-sm font-bold ${isExpired ? 'text-shu' : 'text-gray-500'} ml-1 md:ml-3">
                            ${deadlineText}
                        </span>
                    </div>
                    
                    <div class="flex items-center gap-3 shrink-0 flex-wrap w-full md:w-auto mt-2 md:mt-0">
                `;

                // 意願區塊
                if (isExpired) {
                    rowHTML += `<span class="text-gray-500 font-bold text-sm px-3 py-1 bg-gray-100 rounded-sm">已截止</span>`;
                } else if (currentAppUser.role === 'guest') {
                    rowHTML += `<button class="btn-goto-login px-4 py-1.5 text-sm font-bold rounded-sm border bg-matcha text-white border-matcha transition-colors shadow-sm">填報</button>`;
                } else {
                    rowHTML += `
                        <div class="flex gap-2">
                            <button class="btn-reg-yes px-3 py-1 text-sm font-bold rounded-sm border ${regStatus === 'participating' ? 'bg-matcha text-white border-matcha' : 'bg-white text-matcha hover:bg-matcha hover:text-white border-matcha'} transition-colors shadow-sm" data-id="${act.id}">
                                ${regStatus === 'participating' ? '✓ 已參加' : '我要參加'}
                            </button>
                            <button class="btn-reg-no px-3 py-1 text-sm font-bold rounded-sm border ${regStatus === 'not_participating' ? 'bg-gray-500 text-white border-gray-500' : 'bg-white text-gray-500 hover:bg-gray-500 hover:text-white border-gray-500'} transition-colors shadow-sm" data-id="${act.id}">
                                ${regStatus === 'not_participating' ? '✗ 已婉拒' : '不參加'}
                            </button>
                        </div>
                    `;
                }

                // 管理員功能
                if (canEdit) {
                    rowHTML += `
                        <div class="flex gap-2 border-l border-gray-300 pl-3">
                            <button class="btn-view-results text-asagi hover:text-asagi hover:underline px-1 py-1 rounded-sm font-bold text-xs" data-id="${act.id}" title="參加數：${totalParticipating}">📊 檢視結果</button>
                            <button class="btn-edit text-kin hover:text-kin hover:underline px-1 py-1 rounded-sm font-bold text-xs" data-id="${act.id}">編輯</button>
                            <button class="btn-delete text-shu hover:text-shu hover:underline px-1 py-1 rounded-sm font-bold text-xs" data-id="${act.id}">刪除</button>
                        </div>
                    `;
                }

                rowHTML += `</div>`;
                listRow.innerHTML = rowHTML;
                container.appendChild(listRow);
            });
        }

        // 活動列表點擊事件處理
        document.getElementById('activities-container').addEventListener('click', async (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            // 訪客點擊「登入以報名」
            if (btn.classList.contains('btn-goto-login')) {
                showScreen('auth');
                return;
            }

            // 開啟活動說明
            if (btn.classList.contains('btn-view-desc')) {
                const actId = btn.getAttribute('data-id');
                const act = activities.find(a => a.id === actId);
                if (act) {
                    document.getElementById('view-title').innerText = act.title;
                    const isExpired = act.deadline && new Date(act.deadline + 'T23:59:59') < new Date();
                    const deadlineText = act.deadline ? `填報期限：${act.deadline}` : '無期限';
                    document.getElementById('view-deadline').innerText = `🗓 ${deadlineText} ${isExpired ? '(已截止)' : ''}`;
                    document.getElementById('view-deadline').className = `text-sm font-bold tracking-wide ${isExpired ? 'text-shu' : 'text-matchaDark'}`;
                    
                    let contentHtml = act.description || '';
                    
                    // 若有附件，顯示在內容下方
                    if (act.attachments && act.attachments.length > 0) {
                        contentHtml += `<div class="mt-6 pt-4 border-t border-gray-200">
                            <h4 class="font-bold text-sumi mb-3 flex items-center gap-2">📎 相關附件</h4>
                            <ul class="flex flex-col gap-2">`;
                        act.attachments.forEach(att => {
                            contentHtml += `<li><a href="${att.url}" target="_blank" class="text-asagi hover:text-matcha hover:underline font-bold bg-gray-50 border border-gray-200 px-3 py-2 rounded-sm inline-flex items-center gap-2 w-full md:w-auto shadow-sm">🔗 ${att.name.replace(/</g, "&lt;")}</a></li>`;
                        });
                        contentHtml += `</ul></div>`;
                    }
                    
                    document.getElementById('view-content').innerHTML = contentHtml;
                    document.getElementById('modal-view-activity').classList.remove('hidden');
                }
                return;
            }

            // 管理員檢視報名結果
            if (btn.classList.contains('btn-view-results')) {
                const actId = btn.getAttribute('data-id');
                viewingResultsActivityId = actId;
                const act = activities.find(a => a.id === actId);
                if (act) {
                    document.getElementById('results-title').innerText = `📊 [${act.title}] 報名結果`;
                    
                    const tbody = document.getElementById('results-table-body');
                    tbody.innerHTML = '';
                    const actRegs = registrations.filter(r => r.activityId === actId);
                    
                    let participatingCount = 0;
                    actRegs.forEach(r => {
                        const user = appUsers.find(u => u.id === r.userId);
                        const username = user ? user.username : '(未知用戶)';
                        const isPart = r.status === 'participating';
                        if (isPart) participatingCount++;
                        
                        tbody.innerHTML += `
                            <tr class="border-b border-gray-200">
                                <td class="p-2">${username.replace(/</g, "&lt;")}</td>
                                <td class="p-2 font-bold ${isPart ? 'text-matcha' : 'text-gray-500'}">
                                    ${isPart ? '✓ 已參加' : '✗ 已婉拒'}
                                </td>
                            </tr>
                        `;
                    });
                    
                    if (actRegs.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="2" class="p-4 text-center text-gray-500">尚無人回應</td></tr>`;
                    }
                    
                    document.getElementById('results-stats').innerText = `總回應數：${actRegs.length} | 已參加：${participatingCount}`;
                    document.getElementById('modal-view-results').classList.remove('hidden');
                }
                return;
            }

            const actId = btn.getAttribute('data-id');
            if (!actId) return;
            
            // 編輯/刪除/報名邏輯
            if (btn.classList.contains('btn-edit')) {
                openActivityModal(actId);
            }
            else if (btn.classList.contains('btn-delete')) {
                if (await showCustomAlert("確定要刪除這項活動嗎？此動作將連同報名紀錄一併清除。", true)) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activities', actId));
                }
            }
            else if (btn.classList.contains('btn-reg-yes') || btn.classList.contains('btn-reg-no')) {
                const desired = btn.classList.contains('btn-reg-yes') ? 'participating' : 'not_participating';
                const exReg = registrations.find(r => r.activityId === actId && r.userId === currentAppUser.id);
                if (exReg) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', exReg.id), { status: desired });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                        activityId: actId, userId: currentAppUser.id, status: desired, createdAt: Date.now()
                    });
                }
            }
        });

        // 綁定檢視活動說明的關閉邏輯
        document.getElementById('btn-close-view-modal').addEventListener('click', () => document.getElementById('modal-view-activity').classList.add('hidden'));
        document.getElementById('btn-close-view-bottom').addEventListener('click', () => document.getElementById('modal-view-activity').classList.add('hidden'));

        // 綁定檢視結果的關閉邏輯
        document.getElementById('btn-close-results').addEventListener('click', () => document.getElementById('modal-view-results').classList.add('hidden'));
        document.getElementById('btn-close-results-bottom').addEventListener('click', () => document.getElementById('modal-view-results').classList.add('hidden'));

        // Excel (CSV) 匯出邏輯
        document.getElementById('btn-export-csv').addEventListener('click', () => {
            if (!viewingResultsActivityId) return;
            const act = activities.find(a => a.id === viewingResultsActivityId);
            if (!act) return;

            const actRegs = registrations.filter(r => r.activityId === viewingResultsActivityId);
            // 加入 BOM 確保 Excel 開啟時中文不會亂碼
            let csvContent = "\uFEFF活動名稱,學號/帳號(名稱),意願,回覆時間\n";
            
            actRegs.forEach(r => {
                const user = appUsers.find(u => u.id === r.userId);
                const username = user ? user.username : '(未知用戶)';
                const statusStr = r.status === 'participating' ? '已參加' : '已婉拒';
                const dateStr = new Date(r.createdAt).toLocaleString('zh-TW');
                csvContent += `"${act.title.replace(/"/g, '""')}","${username.replace(/"/g, '""')}","${statusStr}","${dateStr}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `${act.title}_報名結果.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 帳號管理 (Admin)

        document.getElementById('users-table-body').addEventListener('change', async (e) => {

        document.getElementById('users-table-body').addEventListener('click', async (e) => {
            if (e.target.classList.contains('btn-del-user')) {

        document.getElementById('btn-add-user').addEventListener('click', async () => {
            const usr = document.getElementById('input-new-username').value.trim();
            const pwd = document.getElementById('input-new-password').value.trim();
            const role = document.getElementById('select-new-role').value;
            const msg = document.getElementById('add-user-msg');
            
            if (!usr || !pwd) { msg.textContent = '填寫不完整'; msg.className = 'text-shu text-sm font-bold ml-2'; return; }
            if (appUsers.some(u => u.username === usr)) { msg.textContent = '帳號已存在'; msg.className = 'text-shu text-sm font-bold ml-2'; return; }

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appUsers'), { username: usr, password: pwd, role: role, createdAt: Date.now() });
            msg.textContent = '新增成功！'; msg.className = 'text-matcha text-sm font-bold ml-2';
            document.getElementById('input-new-username').value = ''; document.getElementById('input-new-password').value = '';
            setTimeout(() => msg.textContent = '', 3000);
        });

        document.getElementById('btn-bulk-import').addEventListener('click', async () => {
            const lines = document.getElementById('input-bulk-users').value.trim().split('\n');
            const msg = document.getElementById('bulk-import-msg');
            if (!lines[0]) { msg.textContent = '無資料'; msg.className = 'text-shu ml-2'; return; }
            
            let success = 0;
            for (const line of lines) {
                const [usr, pwd, role = 'student'] = line.split(',').map(s => s.trim());
                if (usr && pwd && !appUsers.some(u => u.username === usr)) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appUsers'), { username: usr, password: pwd, role: role, createdAt: Date.now() });
                    success++;
                }
            }
            msg.textContent = `匯入成功: ${success} 筆`; msg.className = 'text-matcha font-bold text-sm ml-2';
            document.getElementById('input-bulk-users').value = '';
            setTimeout(() => msg.textContent = '', 4000);
        });

        const modalPwd = document.getElementById('modal-pwd');
        document.getElementById('btn-change-pwd-modal').addEventListener('click', () => {
            document.getElementById('input-new-pwd').value = '';
            document.getElementById('pwd-msg').textContent = '';
            modalPwd.classList.remove('hidden');
        });
        document.getElementById('btn-close-pwd-modal').addEventListener('click', () => modalPwd.classList.add('hidden'));
        
        document.getElementById('btn-save-pwd').addEventListener('click', async () => {
            const newPwd = document.getElementById('input-new-pwd').value.trim();
            const msg = document.getElementById('pwd-msg');
            if (!newPwd) { msg.textContent = '不能為空'; msg.className = 'text-shu'; return; }
            
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appUsers', currentAppUser.id), { password: newPwd });
                msg.textContent = '修改成功！即將關閉...'; msg.className = 'text-matcha';
                setTimeout(() => modalPwd.classList.add('hidden'), 1500);
            } catch (e) {
                msg.textContent = '失敗: ' + e.message; msg.className = 'text-shu';
            }
        });

        // Quill 編輯器初始化
        function initEditor() {
            if (!quillInstance) {
                const toolbarOptions = [
                    [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }, { 'color': [] }],
                    ['bold', 'italic', 'underline'],
                    ['link']
                ];
                quillInstance = new Quill('#editor-container', {
                    modules: { toolbar: toolbarOptions },
                    theme: 'snow',
                    placeholder: '請在此輸入活動說明...'
                });
            }
        }

        const modalActivity = document.getElementById('modal-activity');
        function openActivityModal(actId = null) {
            initEditor();
            editingActivityId = actId;
            modalActivity.classList.remove('hidden');
            const attachContainer = document.getElementById('attachments-edit-container');
            attachContainer.innerHTML = ''; // 清空附件

            if (actId) {
                document.getElementById('modal-edit-title').innerText = "❁ 修改活動";
                const act = activities.find(a => a.id === actId);
                document.getElementById('input-activity-title').value = act.title;
                document.getElementById('input-activity-deadline').value = act.deadline || '';
                quillInstance.root.innerHTML = act.description || '';
                
                // 載入現有附件
                if (act.attachments && act.attachments.length > 0) {
                    act.attachments.forEach(att => attachContainer.appendChild(createAttachmentRow(att.name, att.url)));
                }
            } else {
                document.getElementById('modal-edit-title').innerText = "❁ 新增活動";
                document.getElementById('input-activity-title').value = '';
                document.getElementById('input-activity-deadline').value = '';
                quillInstance.root.innerHTML = '';
            }
        }

        document.getElementById('btn-create-activity').addEventListener('click', () => openActivityModal());
        document.getElementById('btn-close-edit-modal').addEventListener('click', () => modalActivity.classList.add('hidden'));
        document.getElementById('btn-cancel-edit-modal').addEventListener('click', () => modalActivity.classList.add('hidden'));

        document.getElementById('btn-save-activity').addEventListener('click', async () => {
            const title = document.getElementById('input-activity-title').value.trim();
            const deadline = document.getElementById('input-activity-deadline').value;
            const desc = quillInstance.root.innerHTML;
            
            // 抓取所有附件
            const attachNames = document.querySelectorAll('.attach-name');
            const attachUrls = document.querySelectorAll('.attach-url');
            const attachments = [];
            for (let i = 0; i < attachNames.length; i++) {
                const n = attachNames[i].value.trim();
                const u = attachUrls[i].value.trim();
                if (n || u) {
                    attachments.push({ name: n || '未命名附件', url: u });
                }
            }
            
            if (!title) {
                await showCustomAlert("請填寫活動名稱！");
                return;
            }

            const btn = document.getElementById('btn-save-activity');
            btn.disabled = true; btn.innerText = '儲存中...';

            try {
                if (editingActivityId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activities', editingActivityId), { 
                        title: title, 
                        deadline: deadline, 
                        description: desc, 
                        attachments: attachments,
                        updatedAt: Date.now() 
                    });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'activities'), {
                        title: title, 
                        deadline: deadline, 
                        description: desc, 
                        attachments: attachments,
                        creatorId: currentAppUser.id, 
                        createdAt: Date.now()
                    });
                }
                modalActivity.classList.add('hidden');
                btn.disabled = false; btn.innerText = '儲存';
            } catch(e) {
                btn.disabled = false; btn.innerText = '儲存';
                await showCustomAlert("儲存失敗: " + e.message);
            }
        });

        initSystem();
    </script>
</body>
</html>
